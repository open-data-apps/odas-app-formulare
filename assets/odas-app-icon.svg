<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Formulare -->
  <g filter="url(#shadow)">
    <!-- Clipboard -->
    <rect x="140" y="140" width="232" height="280" rx="12" fill="none" stroke="#ffffff" stroke-width="24"/>
    <!-- Clip -->
    <path d="M 210 140 L 210 110 L 302 110 L 302 140" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round"/>
    <!-- Zeilen -->
    <path d="M 200 220 L 320 220" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 200 280 L 320 280" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 200 340 L 260 340" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <!-- Checkboxen -->
    <rect x="160" y="210" width="20" height="20" rx="4" fill="#ffffff"/>
    <rect x="160" y="270" width="20" height="20" rx="4" fill="#ffffff"/>
  </g>
</svg>